services:
  caddy:
    container_name: desk-caddy
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "3500:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - desk
    depends_on:
      api:
        condition: service_healthy

  api:
    container_name: desk-api
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file: ./backend/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - desk
    depends_on:
      - db

  db:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - desk

networks:
  desk:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  mongo_data:
