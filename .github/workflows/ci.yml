name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=high

  backend:
    name: Backend — test & audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Test
        working-directory: backend
        run: npm test

      - name: Audit
        working-directory: backend
        # xlsx (SheetJS) has known high-severity vulnerabilities with no fix available.
        # Fail only if there are high/critical advisories other than the known xlsx ones.
        run: |
          AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
          HIGH_COUNT=$(echo "$AUDIT_JSON" | jq '[.vulnerabilities // {} | to_entries[] | select(.value.severity == "high" or .value.severity == "critical") | select(.key != "xlsx")] | length')
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Found $HIGH_COUNT high/critical vulnerabilities (excluding xlsx):"
            npm audit --audit-level=high
            exit 1
          fi
          echo "Audit passed (xlsx excluded — no fix available)"
