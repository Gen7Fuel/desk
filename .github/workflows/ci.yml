name: CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=high

  backend:
    name: Backend — test & audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Test
        working-directory: backend
        run: npm test

      - name: Audit
        working-directory: backend
        # xlsx (SheetJS) has known high-severity vulnerabilities with no fix available.
        # Fail only if there are high/critical advisories other than the known xlsx ones.
        run: |
          AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
          HIGH_COUNT=$(echo "$AUDIT_JSON" | jq '[.vulnerabilities // {} | to_entries[] | select(.value.severity == "high" or .value.severity == "critical") | select(.key != "xlsx")] | length')
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Found $HIGH_COUNT high/critical vulnerabilities (excluding xlsx):"
            npm audit --audit-level=high
            exit 1
          fi
          echo "Audit passed (xlsx excluded — no fix available)"

  deploy:
    name: Deploy to Production
    needs: [frontend, backend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
        #   command_timeout: 30m
          script: |
            set -e
            cd ~/desk

            # Pull latest code
            GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git pull origin main

            # Write .env (echo avoids heredoc indentation issues)
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > backend/.env
            echo "SAGE_CLIENT_ID=${{ secrets.SAGE_CLIENT_ID }}" >> backend/.env
            echo "SAGE_CLIENT_SECRET=${{ secrets.SAGE_CLIENT_SECRET }}" >> backend/.env
            echo "SAGE_CALLBACK_URL=${{ secrets.SAGE_CALLBACK_URL }}" >> backend/.env

            # Rebuild and restart, wait for healthy
            export VITE_CDN_BASE="${{ secrets.VITE_CDN_BASE }}"
            export VITE_CDN_ADMIN_TOKEN="${{ secrets.VITE_CDN_ADMIN_TOKEN }}"
            docker compose up -d --build --force-recreate --wait

            # Clean up old images
            docker image prune -f
