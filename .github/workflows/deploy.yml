name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
        #   command_timeout: 30m
          script: |
            set -e
            cd ~/desk

            # Pull latest code
            GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git pull origin main

            # Write .env (echo avoids heredoc indentation issues)
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > backend/.env
            echo "SAGE_CLIENT_ID=${{ secrets.SAGE_CLIENT_ID }}" >> backend/.env
            echo "SAGE_CLIENT_SECRET=${{ secrets.SAGE_CLIENT_SECRET }}" >> backend/.env
            echo "SAGE_CALLBACK_URL=${{ secrets.SAGE_CALLBACK_URL }}" >> backend/.env

            # Rebuild and restart, wait for healthy
            docker compose up -d --build --force-recreate --wait

            # Clean up old images
            docker image prune -f
